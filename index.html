<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SahabatCFGF | Autism Modern Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <section id="landing-page" class="landing-cover">
        <div class="glass-box animate__animated animate__zoomIn">
            <h1>Sahabat<span>CFGF</span></h1>
            <p>Eksplorasi Produk Terbaik dengan Harga Promo!</p>
            <div class="landing-btns">
                <button onclick="openAuth('login')" class="btn-glow">Login</button>
                <button onclick="openAuth('register')" class="btn-ghost">Daftar</button>
            </div>
        </div>
    </section>

    <div id="main-store" style="display:none;">
        <nav class="navbar">
            <div class="container nav-flex">
                <h2 class="logo">Sahabat<span>CFGF</span></h2>
                <div class="nav-right">
                    <button class="btn-nav" onclick="toggleHistory()"><i class="fas fa-receipt"></i></button>
                    <button class="btn-cart" onclick="toggleCart()">
                        <i class="fas fa-shopping-bag"></i> <span id="cart-count">0</span>
                    </button>
                    <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <div class="container store-layout">
            <aside class="sidebar">
                <h3>Kategori</h3>
                <ul id="cat-list"></ul>
            </aside>
            <main class="product-content">
                <div id="product-grid" class="grid"></div>
            </main>
        </div>
    </div>

    <!-- Modals (Auth, Cart, History) -->
    <div id="modal-auth" class="modal">
        <div class="modal-card animate__animated animate__fadeInDown">
            <div id="form-login">
                <h3>Selamat Datang Kembali</h3>
                <input type="text" id="l-user" placeholder="Username">
                <input type="password" id="l-pass" placeholder="Password">
                <button onclick="handleLogin()" class="btn-action">Masuk</button>
            </div>
            <div id="form-reg" style="display:none;">
                <h3>Buat Akun Baru</h3>
                <input type="text" id="r-nama" placeholder="Nama Lengkap">
                <input type="email" id="r-email" placeholder="Email">
                <input type="tel" id="r-tel" placeholder="WhatsApp (628...)">
                <input type="text" id="r-user" placeholder="Username">
                <input type="password" id="r-pass" placeholder="Password">
                <button onclick="handleRegister()" class="btn-action">Daftar</button>
            </div>
            <div id="form-otp" style="display:none;">
                <h3>Verifikasi OTP</h3>
                <input type="text" id="v-otp" placeholder="6 Digit Kode">
                <button onclick="handleVerify()" class="btn-action">Verifikasi</button>
            </div>
            <button class="btn-close-text" onclick="closeModal('modal-auth')">Tutup</button>
        </div>
    </div>

    <div id="modal-cart" class="modal">
        <div class="modal-card wide">
            <h3>Keranjang Saya</h3>
            <div id="cart-list-items" class="cart-scroll"></div>
            <div class="voucher-box">
                <input type="text" id="v-code" placeholder="Kode Voucher">
                <button onclick="applyVoucher()">Pakai</button>
            </div>
            <div class="cart-footer">
                <p>Total: <strong id="cart-total">0</strong></p>
                <button onclick="handleCheckout()" class="btn-checkout">Bayar Sekarang</button>
            </div>
            <button class="btn-close-text" onclick="closeModal('modal-cart')">Kembali Belanja</button>
        </div>
    </div>

    <div id="modal-history" class="modal">
        <div class="modal-card wide">
            <h3>Riwayat Transaksi</h3>
            <div id="history-list" class="cart-scroll"></div>
            <button class="btn-close-text" onclick="closeModal('modal-history')">Tutup</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
