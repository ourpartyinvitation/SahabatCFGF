<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h2>🛒 MyShop</h2>
            <div class="nav-actions">
                <span id="user-info"></span>
                <button onclick="openCart()" id="cart-btn">Keranjang (<span id="cart-count">0</span>)</button>
                <button onclick="openLogin()" id="login-btn">Login</button>
                <button onclick="logout()" id="logout-btn" style="display:none">Logout</button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <aside class="sidebar">
            <h3>Kategori</h3>
            <ul id="category-list">
                <!-- Diisi otomatis oleh JS -->
            </ul>
        </aside>

        <main class="content-area">
            <div id="product-grid" class="grid-container">
                <!-- Produk di sini -->
            </div>
            <div id="pagination" class="pagination-bar">
                <!-- Paginasi di sini -->
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 E-Catalog System</p>
    </footer>

    <!-- Modal Login -->
    <div id="login-modal" class="modal">
        <div class="modal-box">
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <div class="modal-btns">
                <button onclick="doLogin()" class="btn-primary">Masuk</button>
                <button onclick="closeModals()">Batal</button>
            </div>
        </div>
    </div>

    <!-- Modal Keranjang -->
    <div id="cart-modal" class="modal">
        <div class="modal-box wide">
            <h3>Keranjang Anda</h3>
            <div id="cart-items"></div>
            <hr>
            <p><strong>Total: Rp <span id="cart-total">0</span></strong></p>
            <div class="modal-btns">
                <button onclick="doCheckout()" class="btn-success">Checkout Sekarang</button>
                <button onclick="closeModals()">Tutup</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
