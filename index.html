<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Box</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h2>📦 ShoppingBox</h2>
            <div class="nav-buttons">
                <span id="user-display"></span>
                <button onclick="toggleCart()" id="cart-btn">🛒 (<span id="cart-count">0</span>)</button>
                <button onclick="showLoginModal()" id="login-nav-btn">Login</button>
                <button onclick="logout()" id="logout-btn" style="display:none;">Logout</button>
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        <aside class="sidebar">
            <h3>Kategori</h3>
            <ul>
                <li><a href="#" onclick="filterCategory('Semua')">Semua</a></li>
                <li><a href="#" onclick="filterCategory('Elektronik')">Elektronik</a></li>
                <li><a href="#" onclick="filterCategory('Fashion')">Fashion</a></li>
            </ul>
        </aside>

        <main class="content">
            <div id="product-grid" class="grid-container"></div>
            <div id="pagination" class="pagination-controls"></div>
        </main>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3>Login User</h3>
            <input type="text" id="login-user" placeholder="Username">
            <input type="password" id="login-pass" placeholder="Password">
            <div class="modal-actions">
                <button onclick="handleLogin()" class="btn-primary">Masuk</button>
                <button onclick="closeModals()">Batal</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content cart-width">
            <h3>Keranjang Belanja</h3>
            <div id="cart-items-list">
                </div>
            <hr>
            <div class="cart-summary">
                <strong>Total: Rp <span id="cart-total-price">0</span></strong>
            </div>
            <div class="modal-actions">
                <button onclick="processCheckout()" class="btn-checkout">Checkout & Bayar</button>
                <button onclick="closeModals()">Tutup</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
